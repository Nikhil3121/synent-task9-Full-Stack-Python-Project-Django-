{% extends "base.html" %}
{% block title %}Login · Notely{% endblock %}
{% block content %}
<div class="form-card">
    <h2>Welcome back</h2>
    <form method="POST" novalidate>
        <label>
            Username or email
            <input type="text" name="identifier" value="{{ identifier or '' }}" required>
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <label class="checkbox">
            <input type="checkbox" name="remember"> Remember me
        </label>
        <button type="submit" class="btn primary full">Log in</button>
    </form>
    <p class="muted">New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
</div>
{% endblock %}
