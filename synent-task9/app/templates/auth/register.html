{% extends "base.html" %}
{% block title %}Sign up · Notely{% endblock %}
{% block content %}
<div class="form-card">
    <h2>Create account</h2>
    <form method="POST" novalidate>
        <label>
            Username
            <input type="text" name="username" value="{{ username or '' }}" minlength="3" maxlength="40" required>
        </label>
        <label>
            Email
            <input type="email" name="email" value="{{ email or '' }}" required>
        </label>
        <label>
            Password
            <input type="password" name="password" minlength="6" required>
        </label>
        <button type="submit" class="btn primary full">Sign up</button>
    </form>
    <p class="muted">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
