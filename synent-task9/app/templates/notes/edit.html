{% extends "base.html" %}
{% block title %}Edit · Notely{% endblock %}
{% block content %}
<div class="form-card wide">
    <h2>Edit note</h2>
    <form method="POST">
        <label>
            Title
            <input type="text" name="title" value="{{ note.title }}" maxlength="150" required>
        </label>
        <label>
            Content
            <textarea name="content" rows="12" required>{{ note.content }}</textarea>
        </label>
        <div class="form-actions">
            <a href="{{ url_for('notes.view_note', note_id=note.id) }}" class="btn secondary">Cancel</a>
            <button type="submit" class="btn primary">Save changes</button>
        </div>
    </form>
</div>
{% endblock %}
